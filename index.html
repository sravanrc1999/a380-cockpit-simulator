<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRBUS A380 COCKPIT SIMULATOR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .cockpit { background: #111113; }
        .instrument { background: #0a0a0c; border: 2px solid #334155; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
    </style>
</head>
<body class="bg-black text-white overflow-hidden">
    <!-- Top Bar -->
    <div class="fixed top-0 left-0 right-0 z-[90] bg-black/95 border-b border-white/10 flex items-center justify-between px-6 h-14">
        <div class="flex items-center gap-x-4">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-[#003087] rounded-xl flex items-center justify-center">
                    <span class="font-bold text-xl">A</span>
                </div>
                <div>
                    <span class="font-bold text-2xl tracking-tighter">AIRBUS</span>
                    <span class="font-semibold text-2xl tracking-tighter text-blue-400">A380</span>
                </div>
            </div>
            <div class="px-3 py-1 bg-blue-500/20 text-blue-400 text-xs font-mono rounded-2xl">FLIGHT SIM 2026</div>
        </div>

        <div class="flex items-center gap-x-3">
            <div class="flex items-center gap-x-2 bg-white/5 rounded-2xl px-4 py-1.5 text-sm">
                <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
                <span>REAL TIME</span>
            </div>
            <button onclick="toggleFullscreen()" class="px-4 py-2 text-sm border border-white/20 hover:bg-white/5 rounded-3xl flex items-center gap-x-2">
                <i class="fa-solid fa-expand"></i>
            </button>
        </div>
    </div>

    <!-- Main 3D View -->
    <div id="three-container" class="fixed inset-0 pt-14 cockpit">
        <canvas id="canvas"></canvas>
    </div>

    <!-- Camera View Selector -->
    <div class="fixed top-20 left-6 z-[80] bg-black/80 border border-white/10 rounded-3xl p-2 flex flex-col gap-y-1">
        <div class="text-xs text-white/60 px-3 py-1">CAMERA</div>
        <button onclick="setCameraView('captain')" class="px-4 py-2 text-left text-sm hover:bg-white/10 rounded-2xl flex items-center gap-x-3 active:bg-white/20" id="btn-captain">
            <i class="fa-solid fa-user w-4"></i> <span>Captain (Left Seat)</span>
        </button>
        <button onclick="setCameraView('fo')" class="px-4 py-2 text-left text-sm hover:bg-white/10 rounded-2xl flex items-center gap-x-3 active:bg-white/20" id="btn-fo">
            <i class="fa-solid fa-user w-4"></i> <span>First Officer</span>
        </button>
        <button onclick="setCameraView('overhead')" class="px-4 py-2 text-left text-sm hover:bg-white/10 rounded-2xl flex items-center gap-x-3 active:bg-white/20" id="btn-overhead">
            <i class="fa-solid fa-th w-4"></i> <span>Overhead Panel</span>
        </button>
        <button onclick="setCameraView('external')" class="px-4 py-2 text-left text-sm hover:bg-white/10 rounded-2xl flex items-center gap-x-3 active:bg-white/20" id="btn-external">
            <i class="fa-solid fa-plane w-4"></i> <span>External Chase</span>
        </button>
    </div>

    <!-- Flight Controls -->
    <div class="fixed bottom-6 left-6 z-[80] bg-black/90 border border-white/10 rounded-3xl p-5 w-80">
        <div class="flex justify-between items-center mb-4">
            <div class="font-semibold">FLIGHT CONTROLS</div>
            <div class="text-xs text-emerald-400 font-mono">LIVE</div>
        </div>

        <div class="space-y-4">
            <!-- Throttle -->
            <div>
                <div class="flex justify-between text-xs mb-1.5">
                    <span class="text-white/60">THROTTLE</span>
                    <span id="throttle-value" class="font-mono text-orange-400">65%</span>
                </div>
                <input type="range" id="throttle" min="0" max="100" value="65" class="w-full accent-orange-500" oninput="updateThrottle()">
            </div>

            <!-- Flaps -->
            <div>
                <div class="flex justify-between text-xs mb-1.5">
                    <span class="text-white/60">FLAPS</span>
                    <span id="flaps-value" class="font-mono">20°</span>
                </div>
                <div class="flex gap-x-2">
                    <button onclick="setFlaps(0)" class="flex-1 py-2 text-xs bg-white/10 hover:bg-white/20 rounded-2xl">0</button>
                    <button onclick="setFlaps(10)" class="flex-1 py-2 text-xs bg-white/10 hover:bg-white/20 rounded-2xl">10°</button>
                    <button onclick="setFlaps(20)" class="flex-1 py-2 text-xs bg-white/10 hover:bg-white/20 rounded-2xl">20°</button>
                    <button onclick="setFlaps(30)" class="flex-1 py-2 text-xs bg-white/10 hover:bg-white/20 rounded-2xl">FULL</button>
                </div>
            </div>

            <!-- Gear -->
            <div class="flex items-center justify-between">
                <span class="text-sm">LANDING GEAR</span>
                <button onclick="toggleGear()" id="gear-btn" class="px-6 py-1.5 text-sm rounded-2xl bg-emerald-600 hover:bg-emerald-500 font-medium">DOWN</button>
            </div>
        </div>
    </div>

    <!-- Autopilot Panel -->
    <div class="fixed bottom-6 right-6 z-[80] bg-black/90 border border-white/10 rounded-3xl p-5 w-80">
        <div class="font-semibold mb-3 flex items-center gap-x-2">
            <i class="fa-solid fa-robot"></i>
            <span>AUTOPILOT</span>
        </div>
        <div class="grid grid-cols-2 gap-2 text-sm">
            <button onclick="toggleAPMode('hdg')" id="ap-hdg" class="py-2 rounded-2xl bg-white/10 hover:bg-white/20">HDG</button>
            <button onclick="toggleAPMode('alt')" id="ap-alt" class="py-2 rounded-2xl bg-white/10 hover:bg-white/20">ALT</button>
            <button onclick="toggleAPMode('spd')" id="ap-spd" class="py-2 rounded-2xl bg-white/10 hover:bg-white/20">SPD</button>
            <button onclick="toggleAPMode('nav')" id="ap-nav" class="py-2 rounded-2xl bg-white/10 hover:bg-white/20">NAV</button>
        </div>
        <div class="mt-3 text-xs text-white/60">Click to engage • Blue = Active</div>
    </div>

    <!-- Route Selector -->
    <div class="fixed top-20 right-6 z-[80] bg-black/90 border border-white/10 rounded-3xl p-4 w-72">
        <div class="text-xs text-white/60 mb-2">SELECT ROUTE</div>
        <select id="route-select" onchange="changeRoute()" class="w-full bg-white/5 border border-white/20 rounded-2xl px-4 py-2 text-sm">
            <option value="cdg-jfk">Paris CDG → New York JFK (7h 45m)</option>
            <option value="lhr-dxb">London LHR → Dubai DXB (6h 50m)</option>
            <option value="sin-lax">Singapore SIN → Los Angeles LAX (15h 10m)</option>
            <option value="syd-lhr">Sydney SYD → London LHR (21h 40m)</option>
        </select>
    </div>

    <!-- Instruments Overlay -->
    <div class="fixed bottom-28 left-1/2 -translate-x-1/2 z-[80] flex gap-x-3">
        <div class="instrument rounded-2xl p-3 w-40 text-center">
            <div class="text-xs text-white/60">AIRSPEED</div>
            <div id="speed-display" class="font-mono text-4xl font-bold text-emerald-400">248</div>
            <div class="text-xs text-white/60">KTS</div>
        </div>
        <div class="instrument rounded-2xl p-3 w-40 text-center">
            <div class="text-xs text-white/60">ALTITUDE</div>
            <div id="altitude-display" class="font-mono text-4xl font-bold text-emerald-400">35000</div>
            <div class="text-xs text-white/60">FT</div>
        </div>
        <div class="instrument rounded-2xl p-3 w-40 text-center">
            <div class="text-xs text-white/60">HEADING</div>
            <div id="heading-display" class="font-mono text-4xl font-bold text-emerald-400">270</div>
            <div class="text-xs text-white/60">°</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let cockpit, yoke, throttles, screens = [];
        let isPaused = false;
        let timeSpeed = 1;
        let simulationTime = 0;
        let currentView = 'captain';
        let isDragging = false, prevX = 0, prevY = 0;
        let flightData = { speed: 248, altitude: 35000, heading: 270, pitch: 2.5, roll: 0, throttle: 65, flaps: 20, gearDown: true };
        let autopilot = { hdg: false, alt: false, spd: false, nav: false };
        let currentRoute = 'cdg-jfk';

        function initThree() {
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight - 56);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(72, window.innerWidth / (window.innerHeight - 56), 0.1, 200);

            // Lighting
            scene.add(new THREE.AmbientLight(0x334455, 0.6));
            const hemi = new THREE.HemisphereLight(0x4488ff, 0x112244, 0.8);
            scene.add(hemi);

            // Cockpit Base
            const cockpitBase = new THREE.Mesh(
                new THREE.BoxGeometry(8, 3.2, 6),
                new THREE.MeshPhongMaterial({ color: 0x222222, shininess: 8 })
            );
            cockpitBase.position.y = 1.2;
            scene.add(cockpitBase);

            // Main Instrument Panel
            const panel = new THREE.Mesh(
                new THREE.BoxGeometry(6.5, 2.8, 0.4),
                new THREE.MeshPhongMaterial({ color: 0x1a1a1c, shininess: 15 })
            );
            panel.position.set(0, 2.8, -2.8);
            scene.add(panel);

            // Yoke (Captain)
            yoke = new THREE.Group();
            const yokeBase = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.8, 24), new THREE.MeshPhongMaterial({ color: 0x333333 }));
            yokeBase.rotation.x = Math.PI / 2;
            yoke.add(yokeBase);
            const yokeHandle = new THREE.Mesh(new THREE.TorusGeometry(0.9, 0.12, 12, 48), new THREE.MeshPhongMaterial({ color: 0x222222 }));
            yokeHandle.rotation.x = Math.PI / 2;
            yoke.add(yokeHandle);
            yoke.position.set(-1.8, 1.8, -1.5);
            scene.add(yoke);

            // Throttles
            throttles = new THREE.Group();
            for (let i = 0; i < 4; i++) {
                const t = new THREE.Mesh(new THREE.BoxGeometry(0.25, 1.8, 0.35), new THREE.MeshPhongMaterial({ color: 0x444444 }));
                t.position.x = -1.2 + i * 0.65;
                t.position.y = 1.6;
                t.position.z = -1.8;
                throttles.add(t);
            }
            scene.add(throttles);

            // Screens (PFD, ND, EICAS)
            createScreen(-2.2, 3.2, -2.6, 1.6, 1.1, 0x112244); // PFD
            createScreen(0.2, 3.2, -2.6, 1.6, 1.1, 0x112244);   // ND
            createScreen(2.6, 3.2, -2.6, 2.2, 1.3, 0x0a1a2a);   // EICAS

            // Overhead Panel
            const overhead = new THREE.Mesh(new THREE.BoxGeometry(5.5, 0.6, 4.5), new THREE.MeshPhongMaterial({ color: 0x1f1f22 }));
            overhead.position.set(0, 4.8, -1.8);
            scene.add(overhead);

            // Windows
            const windowMat = new THREE.MeshPhongMaterial({ color: 0x112244, shininess: 80, transparent: true, opacity: 0.35 });
            const leftWin = new THREE.Mesh(new THREE.PlaneGeometry(3.5, 2.2), windowMat);
            leftWin.position.set(-3.8, 3.2, -1);
            leftWin.rotation.y = -0.6;
            scene.add(leftWin);

            const rightWin = leftWin.clone();
            rightWin.position.x = 3.8;
            rightWin.rotation.y = 0.6;
            scene.add(rightWin);

            // Exterior (simple A380 shape visible through windows)
            const fuselage = new THREE.Mesh(new THREE.CylinderGeometry(1.8, 1.8, 12, 24), new THREE.MeshPhongMaterial({ color: 0x003087 }));
            fuselage.position.set(0, 2.5, 8);
            fuselage.rotation.x = Math.PI / 2;
            scene.add(fuselage);

            // Stars / Night sky
            const stars = new Float32Array(18000 * 3);
            for (let i = 0; i < stars.length; i++) stars[i] = (Math.random() - 0.5) * 1200;
            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.BufferAttribute(stars, 3));
            scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8 })));

            // Initial camera position (Captain view)
            setCameraView('captain');

            // Raycaster for interaction
            window.addEventListener('click', onCockpitClick);
            setupMouseControls();

            animate();
        }

        function createScreen(x, y, z, w, h, color) {
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(w, h),
                new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.3, shininess: 60 })
            );
            screen.position.set(x, y, z);
            scene.add(screen);
            screens.push(screen);
        }

        function setupMouseControls() {
            const canvas = document.getElementById('canvas');
            canvas.addEventListener('mousedown', e => {
                if (currentView === 'captain' || currentView === 'fo') {
                    isDragging = true;
                    prevX = e.clientX;
                    prevY = e.clientY;
                    canvas.requestPointerLock();
                }
            });
            window.addEventListener('mouseup', () => { isDragging = false; document.exitPointerLock(); });
            window.addEventListener('mousemove', e => {
                if (!isDragging || (currentView !== 'captain' && currentView !== 'fo')) return;
                const dx = e.movementX || e.clientX - prevX;
                const dy = e.movementY || e.clientY - prevY;
                camera.rotation.y -= dx * 0.0015;
                camera.rotation.x -= dy * 0.0015;
                camera.rotation.x = Math.max(-0.6, Math.min(0.6, camera.rotation.x));
                prevX = e.clientX;
                prevY = e.clientY;
            });
        }

        function setCameraView(view) {
            currentView = view;
            // Highlight active button
            document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('bg-white/20'));
            document.getElementById('btn-' + view).classList.add('bg-white/20');

            if (view === 'captain') {
                camera.position.set(-1.6, 3.4, -0.8);
                camera.lookAt(-0.8, 2.8, -3.5);
            } else if (view === 'fo') {
                camera.position.set(1.6, 3.4, -0.8);
                camera.lookAt(0.8, 2.8, -3.5);
            } else if (view === 'overhead') {
                camera.position.set(0, 5.8, -1.5);
                camera.lookAt(0, 4.2, -2.5);
            } else if (view === 'external') {
                camera.position.set(0, 12, -35);
                camera.lookAt(0, 6, 0);
            }
        }

        function updateThrottle() {
            flightData.throttle = parseInt(document.getElementById('throttle').value);
            document.getElementById('throttle-value').innerText = flightData.throttle + '%';
            // Animate throttles
            throttles.children.forEach((t, i) => {
                t.position.y = 1.6 + (flightData.throttle - 50) * 0.008;
            });
        }

        function setFlaps(degrees) {
            flightData.flaps = degrees;
            document.getElementById('flaps-value').innerText = degrees + '°';
        }

        function toggleGear() {
            flightData.gearDown = !flightData.gearDown;
            const btn = document.getElementById('gear-btn');
            btn.innerText = flightData.gearDown ? 'DOWN' : 'UP';
            btn.style.backgroundColor = flightData.gearDown ? '#059669' : '#dc2626';
        }

        function toggleAPMode(mode) {
            autopilot[mode] = !autopilot[mode];
            const btn = document.getElementById('ap-' + mode);
            btn.style.backgroundColor = autopilot[mode] ? '#1e40af' : '';
            btn.style.color = autopilot[mode] ? 'white' : '';
        }

        function changeRoute() {
            currentRoute = document.getElementById('route-select').value;
            // Reset flight data for new route
            if (currentRoute === 'cdg-jfk') { flightData.speed = 248; flightData.altitude = 35000; flightData.heading = 270; }
            else if (currentRoute === 'lhr-dxb') { flightData.speed = 265; flightData.altitude = 38000; flightData.heading = 120; }
            else if (currentRoute === 'sin-lax') { flightData.speed = 255; flightData.altitude = 37000; flightData.heading = 60; }
            else if (currentRoute === 'syd-lhr') { flightData.speed = 245; flightData.altitude = 36000; flightData.heading = 310; }
        }

        function updateInstruments() {
            // Simulate flight dynamics
            if (!isPaused) {
                const throttleEffect = flightData.throttle / 100;
                flightData.speed = Math.max(180, Math.min(520, flightData.speed + (throttleEffect - 0.5) * 0.8));
                flightData.altitude = Math.max(0, Math.min(45000, flightData.altitude + (flightData.pitch * 0.3)));
                flightData.heading = (flightData.heading + flightData.roll * 0.02) % 360;
                if (flightData.heading < 0) flightData.heading += 360;

                // Autopilot influence
                if (autopilot.hdg) flightData.heading = (flightData.heading + 0.1) % 360;
                if (autopilot.alt && flightData.altitude < 38000) flightData.altitude += 2;
                if (autopilot.spd && flightData.speed < 280) flightData.speed += 0.4;
            }

            // Update displays
            document.getElementById('speed-display').innerText = Math.round(flightData.speed);
            document.getElementById('altitude-display').innerText = Math.round(flightData.altitude);
            document.getElementById('heading-display').innerText = Math.round(flightData.heading);

            // Animate yoke based on roll/pitch
            if (yoke) {
                yoke.rotation.z = flightData.roll * 0.015;
                yoke.rotation.x = -flightData.pitch * 0.008;
            }
        }

        function onCockpitClick(e) {
            // Simple click interaction on screens
            const rect = e.target.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            // Raycast for future interactivity
            // For now, clicking screens toggles autopilot
            if (Math.abs(x) < 0.6 && y > 0.3) {
                autopilot.spd = !autopilot.spd;
                const btn = document.getElementById('ap-spd');
                btn.style.backgroundColor = autopilot.spd ? '#1e40af' : '';
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                simulationTime += 0.016 * timeSpeed;

                // Gentle aircraft movement
                flightData.pitch = Math.sin(simulationTime * 0.3) * 1.2 + (flightData.throttle - 50) * 0.015;
                flightData.roll = Math.sin(simulationTime * 0.2) * 0.8;

                // Update instruments
                updateInstruments();

                // Animate external view if active
                if (currentView === 'external') {
                    camera.position.x = Math.sin(simulationTime * 0.1) * 25;
                    camera.position.z = -35 + Math.cos(simulationTime * 0.08) * 8;
                    camera.lookAt(0, 6 + Math.sin(simulationTime * 0.15) * 2, 0);
                }
            }

            renderer.render(scene, camera);
        }

        function init() {
            initThree();

            // Set initial values
            document.getElementById('throttle').value = 65;
            document.getElementById('throttle-value').innerText = '65%';
            document.getElementById('flaps-value').innerText = '20°';

            // Keyboard shortcuts
            document.addEventListener('keydown', e => {
                if (e.key === ' ') { e.preventDefault(); isPaused = !isPaused; }
                if (e.key.toLowerCase() === 'f') toggleFullscreen();
                if (e.key === '1') setCameraView('captain');
                if (e.key === '2') setCameraView('fo');
                if (e.key === '3') setCameraView('overhead');
                if (e.key === '4') setCameraView('external');
            });

            // Start with Captain view
            setCameraView('captain');

            console.log('%c[A380 Cockpit] Advanced simulator initialized. Ready for takeoff.', 'color:#3b82f6');
        }

        window.onload = init;
    </script>
</body>
</html>
